<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>ATM 付款入口</title>
</head>
<body>
    <h1>輸入收款金額</h1>
    <input type="number" id="amount" value="500">
    <button id="payBtn" onclick="pay()">產生付款頁面</button>
    <p id="status"></p>

    <form id="ecpay-form" action="https://payment-stage.ecpay.com.tw/Cashier/AioCheckOut/V5" method="POST">
        <div id="form-fields"></div>
    </form>

    <script>
        function pay() {
            const btn = document.getElementById('payBtn');
            const status = document.getElementById('status');
            const amount = document.getElementById('amount').value;
            
            btn.disabled = true;
            status.innerText = "正在向伺服器請求付款資訊...";

            // 請將此網址替換為你在 Render 上的正式網址
            fetch('https://ecpay-bot.onrender.com/get-atm?amount=' + amount)
            .then(res => res.json())
            .then(data => {
                const params = data.params;
                const container = document.getElementById('form-fields');
                container.innerHTML = '';
                
                // 把後端回傳的每一項參數變成隱藏輸入欄位
                for (const key in params) {
                    container.innerHTML += `<input type="hidden" name="${key}" value="${params[key]}">`;
                }
                
                status.innerText = "資訊取得成功，正在前往綠界...";
                // 自動送出表單
                document.getElementById('ecpay-form').submit();
            })
            .catch(err => {
                status.innerText = "發生錯誤：" + err;
                btn.disabled = false;
            });
        }
    </script>
</body>
</html>
