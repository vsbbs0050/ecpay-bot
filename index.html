<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>ATM 付款入口</title>
</head>
<body>
    <h1>輸入收款金額</h1>
    <input type="number" id="amount" value="500">
    <button id="payBtn" onclick="pay()">產生付款頁面</button>
    <div id="debug" style="margin-top:20px; color:red;"></div>

    <form id="ecpay-form" action="https://payment-stage.ecpay.com.tw/Cashier/AioCheckOut/V5" method="POST">
        <div id="form-fields"></div>
    </form>

    <script>
        function pay() {
            const btn = document.getElementById('payBtn');
            const debug = document.getElementById('debug');
            const amount = document.getElementById('amount').value;
            
            debug.innerText = "正在連線伺服器...";
            btn.disabled = true;

            // 請確認這個網址是 Render 後台給你的那個正確網址
            fetch('https://ecpay-bot.onrender.com/get-atm?amount=' + amount)
            .then(res => res.json())
            .then(data => {
                debug.innerText = "收到參數，準備送出...";
                const params = data.params;
                const container = document.getElementById('form-fields');
                container.innerHTML = '';
                
                // 動態產生隱藏 input
                for (const key in params) {
                    const input = document.createElement('input');
                    input.type = 'hidden';
                    input.name = key;
                    input.value = params[key];
                    container.appendChild(input);
                }
                
                // 強制自動送出表單
                document.getElementById('ecpay-form').submit();
            })
            .catch(err => {
                debug.innerText = "發生錯誤：" + err;
                btn.disabled = false;
            });
        }
    </script>
</body>
</html>
