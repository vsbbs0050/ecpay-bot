<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>ATM 付款入口</title>
</head>
<body>
    <h1>轉帳收款金額</h1>
    <input type="number" id="amount" value="500">
    <button id="payBtn" onclick="pay()">產生付款頁面</button>
    <p id="status"></p>

    <form id="ecpay-form" action="https://payment.ecpay.com.tw/Cashier/AioCheckOut/V5" method="POST">
        <div id="form-fields"></div>
    </form>

    <script>
        function pay() {
            const btn = document.getElementById('payBtn');
            const status = document.getElementById('status');
            const amount = document.getElementById('amount').value;
            
            btn.disabled = true;
            status.innerText = "伺服器喚醒中，請稍候...";

            fetch('https://ecpay-bot.onrender.com/get-atm?amount=' + amount)
            .then(res => res.json())
            .then(data => {
                const params = data.params;
                const container = document.getElementById('form-fields');
                container.innerHTML = '';
                
                for (const key in params) {
                    container.innerHTML += `<input type="hidden" name="${key}" value="${params[key]}">`;
                }
                
                status.innerText = "準備跳轉...";
                document.getElementById('ecpay-form').submit();
            })
            .catch(err => {
                status.innerText = "連線失敗，請稍後再試。";
                btn.disabled = false;
            });
        }
    </script>
</body>
</html>
