<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>收款小工具</title>
</head>
<body>
    <h1>輸入金額收款</h1>
    <input type="number" id="amount" placeholder="金額">
    <button onclick="pay()">產生付款表單</button>

    <form id="ecpay-form" action="https://payment-stage.ecpay.com.tw/Cashier/AioCheckOut/V5" method="POST">
        <div id="form-fields"></div>
    </form>

    <script>
        function pay() {
            const amount = document.getElementById('amount').value;
            // 呼叫你的後端取得參數
            fetch('https://ecpay-bot.onrender.com/get-atm?amount=' + amount)
            .then(res => res.json())
            .then(data => {
                // 這裡會從後端拿到完整的參數物件，我們把它變成 hidden input
                const params = data.params; // 注意：後端要回傳參數，我們稍後修改 test.js
                const container = document.getElementById('form-fields');
                container.innerHTML = '';
                for (const key in params) {
                    container.innerHTML += `<input type="hidden" name="${key}" value="${params[key]}">`;
                }
                // 自動送出表單
                document.getElementById('ecpay-form').submit();
            });
        }
    </script>
</body>
</html>
