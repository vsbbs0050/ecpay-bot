<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ATM 轉帳收款</title>
    <style>
        body { 
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; 
            padding: 25px; text-align: center; 
            background-color: #fdfaf6; /* 暖米色背景 */
            color: #5d4037; /* 溫暖的深棕色文字 */
        }
        h3 { font-weight: 300; letter-spacing: 1px; }
        input { 
            width: 100%; padding: 18px; margin: 15px 0; font-size: 22px; 
            border: 1px solid #d7ccc8; border-radius: 12px; 
            background-color: #ffffff; box-sizing: border-box;
            text-align: center;
        }
        button { 
            width: 100%; padding: 18px; font-size: 18px; font-weight: bold;
            background-color: #8d6e63; color: white; border: none; 
            border-radius: 12px; margin-top: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        button:disabled { background-color: #d7ccc8; }
        #status { margin-top: 25px; color: #a1887f; font-size: 14px; }
    </style>
</head>
<body>
    <h3>ATM 轉帳金額</h3>
    <input type="number" id="amount" placeholder="請輸入金額" inputmode="numeric">
    <button id="payBtn" onclick="pay()">產生轉帳頁面</button>
    <p id="status"></p>

    <form id="ecpay-form" action="https://payment.ecpay.com.tw/Cashier/AioCheckOut/V5" method="POST">
        <div id="form-fields"></div>
    </form>

    <script>
        async function pay() {
            const btn = document.getElementById('payBtn');
            const status = document.getElementById('status');
            const amount = document.getElementById('amount').value;
            
            if (!amount || amount <= 0) {
                status.innerText = "請輸入正確的金額喔！";
                return;
            }

            btn.disabled = true;
            status.innerText = "正在為您準備收款頁面...";

            try {
                const response = await fetch('https://ecpay-bot.onrender.com/get-atm?amount=' + amount);
                const data = await response.json();
                
                const container = document.getElementById('form-fields');
                container.innerHTML = '';
                for (const key in data.params) {
                    container.innerHTML += `<input type="hidden" name="${key}" value="${data.params[key]}">`;
                }
                
                status.innerText = "完成！正在前往銀行轉帳頁...";
                document.getElementById('ecpay-form').submit();
            } catch (err) {
                status.innerText = "連線有一點點小問題，再點一次試試看！";
                btn.disabled = false;
            }
        }

        // 監聽頁面顯示事件 (包含從上一頁返回)
window.addEventListener('pageshow', function(event) {
    // 如果是從瀏覽器緩存返回的 (event.persisted 是 true)，就強制重新整理
    if (event.persisted) {
        window.location.reload();
    }
    });
        
    </script>
</body>
</html>
